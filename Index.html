<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Site → HTML Converter (Privado)</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

.box{
background:#1b1b1b;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 15px #000;
}

input{
width:80%;
padding:10px;
border:none;
border-radius:5px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#00ff88;
font-weight:bold;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#00cc6a;
}

textarea{
width:100%;
height:320px;
margin-top:20px;
background:black;
color:#00ff88;
border:none;
padding:10px;
border-radius:5px;
}
</style>
</head>

<body>

<div class="box">

<h2>🌐 Transformar Site em HTML</h2>

<input id="url" placeholder="Cole o link do site aqui">

<br>

<button onclick="buscar()">Converter</button>
<button onclick="copiar()">Copiar Código</button>

<textarea id="resultado" placeholder="O código HTML vai aparecer aqui"></textarea>

</div>

<script>

async function buscar(){

let url = document.getElementById("url").value

try{

let response = await fetch(url)
let text = await response.text()

document.getElementById("resultado").value = text

}catch(e){

document.getElementById("resultado").value =
"Erro ao pegar o site.\nAlguns sites bloqueiam acesso por segurança (CORS)."

}

}

function copiar(){

let texto = document.getElementById("resultado")

texto.select()
texto.setSelectionRange(0,999999)

document.execCommand("copy")

alert("Código copiado!")

}

</script>

</body>
  </html>
